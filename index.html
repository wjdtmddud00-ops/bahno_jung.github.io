    <link rel="icon" href="data:," />

    <link rel="apple-touch-icon" href="data:," />
    <meta property="og:type" content="website" />

    <meta property="og:description" content="Bahno Jung의 사진 포트폴리오. 다양한 작품을 한눈에 감상해 보세요." />
    <meta property="og:image" content="og-image.png" />

  </head>
  <body class="main-page">
    <nav class="collection-nav" id="collection-nav">
      <!-- collections.json을 통해 자동으로 메뉴가 렌더링됩니다. -->
    </nav>

    <header class="site-header">
      <div class="header-inner">
        <div>
          <h1 class="site-title">
            <a href="index.html" class="site-title-link">Bahno Jung</a>
          </h1>
        </div>
      </div>
    </header>

    <main class="main-blank">
      <!-- 메인: 로고 아래 흰 공백 -->
    </main>

    <script>
      const MONDRIAN_COLORS = ["#FFD000", "#E53935", "#1565C0", "#00C853", "#FF4081"];

      function colorizeLetters(element) {
        const text = element.textContent || "";
        element.textContent = "";
        let prevColor = null;
        for (const ch of text) {
          if (ch === " ") {
            element.appendChild(document.createTextNode(" "));
            continue;
          }
          const choices = prevColor
            ? MONDRIAN_COLORS.filter((c) => c !== prevColor)
            : MONDRIAN_COLORS;
          const color = choices[Math.floor(Math.random() * choices.length)];
          prevColor = color;
          const span = document.createElement("span");
          span.textContent = ch;
          span.style.color = color;
          element.appendChild(span);
        }
      }

      // 컬렉션 메뉴 로드 (WALL, COLLECTION#1, COLLECTION#2)
      async function loadSidebar() {
        const nav = document.getElementById("collection-nav");
        if (!nav) return;

        let currentId = "index";
        if (window.location.pathname.includes("collection.html")) {
          currentId = new URLSearchParams(window.location.search).get("collection") || "";
        }

        try {
          const res = await fetch("collections.json", { cache: "no-store" });
          if (!res.ok) return;
          const collections = await res.json();
          if (!Array.isArray(collections)) return;

          function displayName(id) {
            return id && id.startsWith("_") ? id.slice(1) : (id || "");
          }
          collections.forEach((collection, index) => {
            const link = document.createElement("a");
            link.href = "collection.html?collection=" + encodeURIComponent(collection.id);
            link.textContent = displayName(collection.id);
            link.className = "sidebar-link";
            if (collection.id === currentId) link.classList.add("active");
            // _ 로 시작하는 컬렉션은 맨 위에 표시하고 아래 간격 추가
            if (collection.id.startsWith("_")) {
              link.classList.add("wall-link");
            }
            colorizeLetters(link);
            nav.appendChild(link);
          });
        } catch (e) {}
      }
      loadSidebar();
    </script>
  </body>
</html>
